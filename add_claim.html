<!DOCTYPE html>
<html>
<head>
  <title>Add Claim</title>
</head>
<body style="text-align:center;">
  <h2>Add a New Claim</h2>
  <form method="POST">
    <input type="text" name="patient_name" placeholder="Patient Name" required><br><br>
    <input type="number" name="age" placeholder="Age" required><br><br>
    <input type="text" name="gender" placeholder="Gender" required><br><br>
    <input type="text" name="hospital" placeholder="Hospital" required><br><br>
    <input type="text" name="diagnosis" placeholder="Diagnosis" required><br><br>
    <input type="number" name="claim_amount" placeholder="Claim Amount" required><br><br>
    <button type="submit">Submit Claim</button>
  </form>
  <br><a href="/">⬅ Back to Home</a>
</body>
</html>
