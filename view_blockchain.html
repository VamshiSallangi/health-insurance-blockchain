<!DOCTYPE html>
<html>
<head>
  <title>Blockchain View</title>
</head>
<body style="text-align:center;">
  <h2>🔗 Blockchain View</h2>
  {% for block in chain %}
  <div style="border:1px solid #999; margin:15px auto; width:80%; padding:15px;">
    <h3>Block {{ block.index }}</h3>
    <p><b>Hash:</b> {{ block.hash }}</p>
    <p><b>Previous Hash:</b> {{ block.previous_hash }}</p>
    <p><b>Timestamp:</b> {{ block.timestamp }}</p>
    <p><b>Transactions:</b></p>
    <ul style="text-align:left; width:70%; margin:auto;">
      {% for txn in block.transactions %}
      <li>{{ txn }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endfor %}
  <a href="/">⬅ Back to Home</a>
</body>
</html>
