<!DOCTYPE html>
<html>
<head>
  <title>Blockchain Health Claims</title>
  <style>
    body { font-family: Arial; background-color: #f4f6f8; text-align: center; padding: 50px; }
    .btn { margin: 10px; padding: 12px 20px; background-color: #007bff; color: white; border: none; border-radius: 6px; text-decoration: none; }
    .btn:hover { background-color: #0056b3; }
    .btn-danger { background-color: #dc3545; }
    .btn-danger:hover { background-color: #b02a37; }
  </style>
</head>
<body>
  <h2>🏥 Blockchain-Powered Health Insurance Claim System</h2>
  <p>Total Claims: <b>{{ total }}</b></p>
  <div>
    <a href="/add_claim" class="btn">➕ Add New Claim</a>
    <a href="/view_claims" class="btn">📋 View All Claims</a>
    <a href="/view_blockchain" class="btn">🔗 View Blockchain</a>
    <a href="/load_demo_csv" class="btn">📂 Load Demo Data</a>
  </div>
  <form action="/clear_blockchain" method="get">
    <button type="submit" class="btn btn-danger">🗑 Clear Blockchain</button>
  </form>
</body>
</html>
